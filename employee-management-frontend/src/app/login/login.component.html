<div class="container-fluid min-vh-100 d-flex flex-column justify-content-center align-items-center pb-5">

  <!-- App Title -->
  <div class="text-center mb-4" style="margin-top:-60px;">

    <h1
      class="fw-bold mb-2"
      style="
        color:#352f44;
        font-family:'Segoe UI',sans-serif;
        font-size:2.3rem;
        letter-spacing:1px;
      "
    >
      Employee Management System
    </h1>

    <p
      class="mb-0"
      style="
        color:#5c5470;
        font-family:'Poppins',sans-serif;
        font-size:1rem;
      "
    >
      Secure Login Portal
    </p>

  </div>

  <!-- Error Message -->
  <div
    *ngIf="errorMessage"
    class="alert alert-danger w-100"
    style="max-width: 600px;"
  >
    {{ errorMessage }}
  </div>

  <!-- Login Card -->
  <div
    class="col-md-6 col-lg-4"
    style="margin-top:-10px;"
  >

    <div
      class="card shadow-lg border-0 rounded-4"
      style="background-color: rgba(255,255,255,0.92);"
    >

      <div class="card-body p-4">

        <!-- Card Heading -->
        <div class="text-center mb-4">

          <h2
            class="fw-bold mb-1"
            style="
              color:#2f2e41;
              font-family:'Poppins',sans-serif;
            "
          >
            Welcome Back
          </h2>

          <p
            class="small mb-0"
            style="
              color:#6b7280;
              font-family:'Segoe UI',sans-serif;
            "
          >
            Sign in to continue
          </p>

        </div>

        <!-- Success Message -->
        <div *ngIf="message" class="alert alert-success">
          {{ message }}
        </div>

        <!-- Login Form -->
        <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">

          <!-- Email -->
          <div class="mb-4">

            <label
              for="email"
              class="form-label fw-semibold"
              style="
                color:#444054;
                font-family:'Poppins',sans-serif;
                font-size:0.95rem;
              "
            >
              Email Address
            </label>

            <input
              type="email"
              #email="ngModel"
              name="email"
              id="email"
              placeholder="Enter your email"
              [(ngModel)]="loginRequest.email"
              class="form-control form-control-lg rounded-3"
              required
              email
            />

            <div
              class="small mt-2"
              style="
                color:#d63384;
                font-family:'Segoe UI',sans-serif;
              "
              *ngIf="email.invalid && email.touched"
            >
              Valid email required
            </div>

          </div>

          <!-- Password -->
          <div class="mb-4">

            <label
              for="password"
              class="form-label fw-semibold"
              style="
                color:#444054;
                font-family:'Poppins',sans-serif;
                font-size:0.95rem;
              "
            >
              Password
            </label>

            <input
              type="password"
              #password="ngModel"
              name="password"
              id="password"
              placeholder="Enter your password"
              [(ngModel)]="loginRequest.password"
              class="form-control form-control-lg rounded-3"
              required
              minlength="8"
            />

            <div
              class="small mt-2"
              style="
                color:#d63384;
                font-family:'Segoe UI',sans-serif;
              "
              *ngIf="password.errors?.['minlength'] && password.touched"
            >
              Password must contain at least 8 characters
            </div>

          </div>

          <!-- Login Button -->
         <button
  type="submit"
  class="btn btn-lg w-100 fw-bold rounded-3 text-white d-flex justify-content-center align-items-center gap-2"
  style="
    background: linear-gradient(to right,#6c63ff,#7f53ac);
    border:none;
    font-family:'Poppins',sans-serif;
    letter-spacing:0.5px;
  "
  [disabled]="loginForm.invalid || spinner"
>

  <div
    *ngIf="spinner"
    class="spinner-border spinner-border-sm text-light"
    role="status"
  >
  </div>

  <span>
    {{ spinner ? 'Signing In...' : 'Sign In' }}
  </span>

</button>
        </form>

        <!-- Forgot Password -->
        <div class="text-end mt-3">

          <a
            routerLink="/forgot-password"
            class="text-decoration-none fw-semibold"
            style="
              color:#6c63ff;
              font-family:'Poppins',sans-serif;
              font-size:0.9rem;
            "
          >
            Forgot Password?
          </a>

        </div>

      </div>

    </div>

  </div>

</div>
