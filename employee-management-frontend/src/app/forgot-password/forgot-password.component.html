<div class="row justify-content-center mt-5">

  <div class="col-lg-6">

    <div
      class="card border-0 shadow-lg rounded-4 overflow-hidden"
      style="background-color: rgba(255,255,255,0.94);"
    >

      <!-- Header -->
      <div
        class="card-header border-0 py-4 text-white"
        style="
          background: linear-gradient(to right,#5d5b81,#7f53ac);
        "
      >

        <h3
          class="fw-bold mb-2"
          style="font-family:'Poppins',sans-serif;"
        >
          🔐 Forgot Password
        </h3>

        <p
          class="mb-0"
          style="
            color:#f3e8ff;
            font-size:0.95rem;
          "
        >
          Please enter your registered email address to receive a password reset link.
        </p>

      </div>

      <!-- Success Message -->
      <div
        *ngIf="message"
        class="alert alert-success border-0 rounded-0 mb-0"
        role="alert"
        style="
          background-color:#e8f7ee;
          color:#166534;
        "
      >
        {{message}}
      </div>

      <!-- Error Message -->
      <div
        *ngIf="errorMessage"
        class="alert border-0 rounded-0 mb-0"
        role="alert"
        style="
          background-color:#fdecec;
          color:#b42318;
        "
      >
        {{errorMessage}}
      </div>

      <!-- Body -->
      <div class="card-body p-4">

        <form #fpform="ngForm" (ngSubmit)="onSubmit()">

          <!-- Email -->
          <div class="mb-4">

            <label
              for="email"
              class="form-label fw-semibold"
              style="color:#403b5f;"
            >
              Email Address
            </label>

            <input
              type="email"
              #email="ngModel"
              name="email"
              id="email"
              class="form-control form-control-lg rounded-3 border-0 shadow-sm"
              style="background-color:#f8f7ff;"
              placeholder="Enter Your Registered Email"
              [(ngModel)]="forgotPassword.email"
              required
              email
            >

            <!-- Required -->
            <div
              *ngIf="email.errors?.['required'] && email.touched"
              class="small mt-2"
              style="color:#d63384;"
            >
              Email is required
            </div>

            <!-- Invalid -->
            <div
              *ngIf="email.errors?.['email'] && email.touched"
              class="small mt-2"
              style="color:#d63384;"
            >
              Please enter a valid email address
            </div>

          </div>

          <!-- Button -->
          <div class="d-grid mt-4">

            <button
              type="submit"
              class="btn btn-lg text-white fw-semibold rounded-3"
              style="
                background: linear-gradient(to right,#5d5b81,#7f53ac);
                border:none;
              "
              [disabled]="fpform.invalid"
            >
              Send Password Reset Link
            </button>

          </div>

        </form>

      </div>

    </div>

  </div>

</div>
