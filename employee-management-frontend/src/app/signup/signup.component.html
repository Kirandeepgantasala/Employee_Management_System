<div class="container w-50">
   
   
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow p-4">
                    <div class="text-center bg-primary">
                        <h3 class="text-white">Register</h3>
                    </div>
                    <div class="card-body">
 <form #signUpForm="ngForm" (ngSubmit)="onSubmit(signUpForm)">
 <div class="mb-3">
         <label for="email" class="mt-2 mb-2" >Email</label>
    <input type="email" #email="ngModel" name="email" id="email" [(ngModel)]="registerRequest.email" class="form-control">

    </div>
    <div class="mb-3">

    <label for="password" class="mt-2 mb-2">Password</label>
    <input type="password" #name="ngModel" name="password" id="password" [(ngModel)]="registerRequest.password" class="form-control">

    </div>
   
    <button type="submit" class="btn btn-primary w-80 mt-2">Submit</button>

</form>
                    </div>
                </div>
            </div>
        </div>
   
   
   
        
</div>
