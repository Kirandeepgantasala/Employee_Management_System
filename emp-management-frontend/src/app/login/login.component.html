<div class="container w-50 mt-5">
    
    <div class="row justify-content-center">
        
               
        <div class="col-md-8">
            <div class="card shadow p-4">
                <div class="bg-primary text-center p-2">
                     <h3 class="text-white">Login</h3>
                </div>
<div class="card-body">
                 <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
   
                    <div class="mb-3">
                        <label for="email" class="mt-2 mb-2">Email</label>
    <input type="email" #email="ngModel" name="email" id="email" [(ngModel)]="loginRequest.email" class="form-control">

                    </div>
                    
                    <div class="mb-3">
                         <label for="password" class="mt-2 mb-2">Password</label>
    <input type="password" #name="ngModel" name="password" id="password" [(ngModel)]="loginRequest.password" class="form-control">

                    </div>
   
    <button type="submit" class="submit btn btn-primary w-80 mt-2">Submit</button>
</form>
</div>

            </div>
        </div>
    </div>
   
</div>

<div *ngIf="message"
     class="alert alert-success">

   {{message}}

</div>

<div *ngIf="errorMessage"
     class="alert alert-danger">

   {{errorMessage}}

</div>
