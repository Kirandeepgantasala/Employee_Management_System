<!-- Success Message -->
<div
  *ngIf="message"
  class="alert alert-success shadow-sm border-0 rounded-3"
>
  {{message}}
</div>

<!-- Error Message -->
<div
  *ngIf="errorMessage"
  class="alert alert-danger shadow-sm border-0 rounded-3"
>
  {{errorMessage}}
</div>

<!-- Users Table Card -->
<div
  class="card border-0 shadow-lg rounded-4 mt-3 overflow-hidden"
  style="background-color: rgba(255,255,255,0.94);"
>

  <!-- Header -->
  <div
    class="px-4 py-3"
    style="
      background: linear-gradient(to right,#5d5b81,#7f53ac);
      color:white;
    "
  >

    <h4
      class="mb-0 fw-bold"
      style="font-family:'Poppins',sans-serif;"
    >
      👥 Users Management
    </h4>

  </div>

  <!-- Table -->
  <div class="table-responsive">

    <table
      *ngIf="list | async as data"
      class="table align-middle mb-0"
    >

      <thead
        style="
          background-color:#f3f0ff;
          color:#403b5f;
        "
      >

        <tr>

          <th class="py-3 ps-4">#</th>

          <th>Employee ID</th>

          <th>Status</th>

          <th>Email</th>

          <th>Role</th>

          <th>Change Role</th>

          <th class="pe-4">Access</th>

        </tr>

      </thead>

      <tbody>

        <tr
          *ngFor="let d of data; let i=index;"
          style="vertical-align:middle;"
        >

          <!-- Index -->
          <td class="ps-4 fw-semibold">
            {{i+1}}
          </td>

          <!-- Employee ID -->
          <td>
            {{d.id}}
          </td>

          <!-- Status -->
          <td>

            <span
              class="badge rounded-pill px-3 py-2"
              [ngStyle]="{
                'background-color': d.enabled ? '#dcfce7' : '#fee2e2',
                'color': d.enabled ? '#166534' : '#991b1b'
              }"
            >
              {{d.enabled ? 'Enabled' : 'Disabled'}}
            </span>

          </td>

          <!-- Email -->
          <td style="color:#4b5563;">
            {{d.email}}
          </td>

          <!-- Current Role -->
          <td>

            <span
              class="badge rounded-pill px-3 py-2"
              style="
                background-color:#ede9fe;
                color:#5b21b6;
              "
            >
              {{d.role}}
            </span>

          </td>

          <!-- Change Role -->
          <td>

            <div class="d-flex align-items-center gap-2">

              <select
                #mySelect
                name="changerole"
                (focus)="onFocus(mySelect.value)"
                [(ngModel)]="d.role"
                class="form-select rounded-3 shadow-sm border-0"
                style="
                    background-color:#f4f1ff;
  color:#403b5f;
  font-weight:500;
                "
              >

                <option value="">
                  Select Role
                </option>

                <option value="EMPLOYEE">
                  EMPLOYEE
                </option>

                <option value="ADMIN">
                  ADMIN
                </option>

                <option value="HR">
                  HR
                </option>

              </select>

              <button
                (click)="updateRole(d)"
                class="btn text-white fw-semibold rounded-3 px-3"
                style="
                  background: linear-gradient(to right,#6c63ff,#7f53ac);
                  border:none;
                "
              >
                Update
              </button>

            </div>

          </td>

          <!-- Enable / Disable -->
          <td class="pe-4">

            <button
              (click)="updateAccess(d)"
              class="btn rounded-3 fw-semibold text-white"
              [ngStyle]="{
                'background': d.enabled
                  ? 'linear-gradient(to right,#4b6cb7,#6a82fb)'
                  :  'linear-gradient(to right,#a445b2,#d41872)',
                'border':'none'
              }"
            >

              {{d.enabled ? 'Disable' : 'Enable'}}

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
