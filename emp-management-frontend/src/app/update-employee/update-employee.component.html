<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header">
    <h2 class="text-primary">Update Employee Details</h2>
</div>
            <div class="card-body">
<form #updateForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
<label for="empName" class="form-label">Employee Name</label>
<input type="text" name="empName" id="empName" [(ngModel)]="updateEmployeeRequest.employeeName" placeholder="Enter Employee Name" class="form-control">
</div>
<div class="mb-3">
<label for="email" class="form-label">Update Employee Email</label>
<input type="email" name="email" id="email" [(ngModel)]="updateEmployeeRequest.email" placeholder="Enter Employee email" class="form-control">
</div>

<div class="mb-3">
<label for="designation" class="form-label">Designation</label>
<input type="text" name="designation" id="designation"[(ngModel)]="updateEmployeeRequest.designation" placeholder="Enter employee designation" class="form-control">
</div>
<div class="mb-3">
<label for="salary" class="form-label">Salary</label>
<input type="number" name="salary" id="salary" [(ngModel)]="updateEmployeeRequest.salary" placeholder="Enter Employee Salary" class="form-control">
</div>
<div class="d-grid">
    <button class="btn btn-primary">Update</button>
</div>

</form>
            </div>
        </div>
    </div>
</div>
